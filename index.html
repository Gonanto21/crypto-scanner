const fmt = {
  usd(v) {
    if (v == null || isNaN(v)) return "--";
    if (Math.abs(v) >= 1000) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(v);
    }
    if (Math.abs(v) >= 1) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 4 }).format(v);
    }
    return "$" + Number(v).toFixed(8).replace(/0+$/, "").replace(/\.$/, "");
  },
  compact(v) {
    if (v == null || isNaN(v)) return "--";
    return new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 2 }).format(v);
  },
  pct(v, d = 2) {
    if (v == null || isNaN(v)) return "--";
    const s = v > 0 ? "+" : "";
    return `${s}${Number(v).toFixed(d)}%`;
  },
  num(v, d = 2) {
    if (v == null || isNaN(v)) return "--";
    return Number(v).toFixed(d);
  },
  time(ts) {
    if (!ts) return "--";
    return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  },
  dateTime(ts) {
    if (!ts) return "--";
    return new Date(ts).toLocaleString([], { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
  }
};

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function norm(v, min, max) { if (max === min) return 0; return clamp((v - min) / (max - min), 0, 1); }
function score100(x) { return Math.round(clamp(x, 0, 1) * 100); }
function avg(vals) { if (!vals?.length) return 0; return vals.reduce((a, b) => a + b, 0) / vals.length; }
function stdDev(vals) { if (!vals?.length) return 0; const mean = avg(vals), variance = avg(vals.map(v => (v - mean) ** 2)); return Math.sqrt(variance); }

function ema(vals, p) {
  if (!vals?.length) return null;
  const k = 2 / (p + 1);
  let out = vals[0];
  for (let i = 1; i < vals.length; i++) out = vals[i] * k + out * (1 - k);
  return out;
}

function rsi(vals, p = 14) {
  if (!vals || vals.length < p + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = vals.length - p; i < vals.length; i++) {
    const diff = vals[i] - vals[i - 1];
    if (diff >= 0) gains += diff;
    else losses += Math.abs(diff);
  }
  if (losses === 0) return 100;
  const rs = gains / losses;
  return 100 - 100 / (1 + rs);
}

function macd(vals) {
  if (!vals?.length) return { line: 0, signal: 0, hist: 0, bias: "neutral" };
  const fast = ema(vals, 12) ?? 0;
  const slow = ema(vals, 26) ?? 0;
  const line = fast - slow;
  const macdSeries = [];
  for (let i = 0; i < vals.length; i++) {
    const slice = vals.slice(0, i + 1);
    macdSeries.push((ema(slice, 12) ?? 0) - (ema(slice, 26) ?? 0));
  }
  const signal = ema(macdSeries.slice(-9), 9) ?? 0;
  const hist = line - signal;
  return { line, signal, hist, bias: hist > 0 ? "bull" : hist < 0 ? "bear" : "neutral" };
}

function normalizeSymbol(v) {
  return String(v || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
}

function isStableOrPegged(symbol, name = "") {
  const s = normalizeSymbol(symbol);
  const n = String(name || "").toLowerCase();
  if (STABLE_OR_PEGGED_SYMBOLS.has(s)) return true;
  return /(usd|dollar|stable|eur|gold)/i.test(n);
}

function getSessionState() {
  const now = new Date();
  const day = now.getDay();
  const weekend = day === 0 || day === 6;
  return {
    mode: weekend ? "weekend" : "weekday",
    note: weekend ? "Half size · Limit orders" : "Normal size · Active",
    clock: `CET ${now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`,
    isWeekend: weekend
  };
}

function renderSessionBar() {
  const s = getSessionState();
  els.sessionBar.innerHTML = `<span>${s.clock}</span><span>${s.mode.toUpperCase()}</span><span>${s.note}</span>`;
}

function computeIndicators(row) {
  const prices = row.sparkline_in_7d?.price?.filter(v => Number.isFinite(v)) || [row.current_price];
  const current = row.current_price || prices[prices.length - 1] || 0;
  const ema20 = ema(prices.slice(-40), 20) ?? current;
  const ema50 = ema(prices.slice(-80), 50) ?? current;
  const avgPrice = avg(prices);
  const macdPack = macd(prices);
  const rsi14 = rsi(prices, 14);
  const sigma = stdDev(prices);
  const atr14 = sigma * 1.6 || current * 0.02;
  const atrPct = current ? (atr14 / current) * 100 : 0;
  const vwap = avgPrice;
  const vwapDeviationPct = current ? ((current - vwap) / vwap) * 100 : 0;
  const recent = prices.slice(-12);
  const support1 = Math.min(...recent);
  const resistance1 = Math.max(...recent);
  const support2 = support1 - atr14;
  const resistance2 = resistance1 + atr14;
  const priceChanges = [];
  for (let i = 1; i < prices.length; i++) priceChanges.push(((prices[i] - prices[i - 1]) / prices[i - 1]) * 100);
  const shortMomentum = avg(priceChanges.slice(-6));
  const momentum5m = shortMomentum > 0.05 ? "bullish" : shortMomentum < -0.05 ? "bearish" : "flat";
  const volumeRatio = clamp((row.total_volume || 0) / Math.max(row.market_cap || 1, 1) * 120, 0, 5);
  const volumeQuality = volumeRatio >= 2 ? "high" : volumeRatio >= 0.9 ? "medium" : "low";
  const spreadRiskPct = clamp(atrPct * 0.35, 0.05, 2.5);

  return {
    rsi14,
    macdLine: macdPack.line,
    macdSignal: macdPack.signal,
    macdHist: macdPack.hist,
    macdBias: macdPack.bias,
    ema20,
    ema50,
    emaTrend: ema20 > ema50 ? "bull" : ema20 < ema50 ? "bear" : "neutral",
    vwap,
    vwapDeviationPct,
    atr14,
    atrPct,
    support1,
    support2,
    resistance1,
    resistance2,
    trend1h: ema20 > ema50 ? "bull" : ema20 < ema50 ? "bear" : "range",
    momentum5m,
    volumeRatio,
    volumeQuality,
    spreadRiskPct
  };
}

function calcTrendScore(market, indicators) {
  const emaCross = indicators.ema20 > indicators.ema50 ? 1 : 0;
  const aboveEma20 = market.price > indicators.ema20 ? 1 : 0;
  const aboveVwap = market.price > indicators.vwap ? 1 : 0;
  const trend7d = norm(market.change7dPct, -12, 12);
  return score100(0.4 * emaCross + 0.2 * aboveEma20 + 0.2 * aboveVwap + 0.2 * trend7d);
}

function calcMomentumScore(market, indicators) {
  const rsiSweet = clamp(1 - Math.abs(indicators.rsi14 - 60) / 22, 0, 1);
  const macdNorm = norm(indicators.macdHist, -0.02, 0.02);
  const chg1h = norm(market.change1hPct, -3, 3);
  const chg24 = norm(market.change24hPct, -8, 8);
  return score100(0.35 * rsiSweet + 0.35 * macdNorm + 0.15 * chg1h + 0.15 * chg24);
}

function calcPullbackScore(market, indicators, scores) {
  const bullishContext = scores.trendScore >= 65 ? 1 : 0;
  const vwapRetest = 1 - norm(Math.abs(indicators.vwapDeviationPct), 0, 2.8);
  const rsiCooldown = clamp(1 - Math.abs(indicators.rsi14 - 43) / 14, 0, 1);
  const supportDistPct = Math.abs((market.price - indicators.support1) / market.price) * 100;
  const supportProximity = 1 - norm(supportDistPct, 0, 2.5);
  return score100(0.4 * bullishContext + 0.25 * vwapRetest + 0.2 * rsiCooldown + 0.15 * supportProximity);
}

function calcBreakoutScore(market, indicators, scores) {
  const aboveR1 = market.price > indicators.resistance1 * 0.997 ? 1 : 0;
  const macdPos = indicators.macdHist > 0 ? 1 : 0;
  const rsiReady = indicators.rsi14 >= 58 && indicators.rsi14 <= 76 ? 1 : 0;
  const volExpand = norm(indicators.volumeRatio, 0.7, 2.4);
  const trendOk = scores.trendScore > 60 ? 1 : 0;
  return score100(0.3 * aboveR1 + 0.25 * macdPos + 0.2 * rsiReady + 0.15 * volExpand + 0.1 * trendOk);
}

function calcBearScore(market, indicators) {
  const emaCrossDown = indicators.ema20 < indicators.ema50 ? 1 : 0;
  const belowEma20 = market.price < indicators.ema20 ? 1 : 0;
  const belowVwap = market.price < indicators.vwap ? 1 : 0;
  const negTrend7d = norm(-market.change7dPct, -12, 12);
  return score100(0.4 * emaCrossDown + 0.2 * belowEma20 + 0.2 * belowVwap + 0.2 * negTrend7d);
}

function calcLiquidityScore(market) {
  return score100(norm(market.volume24hUsd, 1e6, 3e9));
}

function calcRiskScore(indicators, session) {
  const atrRisk = norm(indicators.atrPct, 0.4, 10);
  const spreadRisk = norm(indicators.spreadRiskPct, 0.05, 1.5);
  const weekendPenalty = session.isWeekend ? 0.15 : 0;
  return score100(0.55 * atrRisk + 0.3 * spreadRisk + 0.15 * weekendPenalty);
}

function calcConfidenceScore(scores) {
  return score100(
    0.3 * (scores.trendScore / 100) +
    0.25 * (scores.momentumScore / 100) +
    0.2 * (Math.max(scores.pullbackScore, scores.breakoutScore) / 100) +
    0.15 * (scores.liquidityScore / 100) +
    0.1 * (1 - scores.riskScore / 100)
  );
}

function calcWinProbability(scores) {
  return score100(
    0.35 * (scores.trendScore / 100) +
    0.25 * (scores.momentumScore / 100) +
    0.2 * (Math.max(scores.pullbackScore, scores.breakoutScore) / 100) +
    0.1 * (scores.liquidityScore / 100) +
    0.1 * (1 - scores.riskScore / 100)
  );
}

function calcRankScore(scores) {
  return Number((
    0.3 * scores.trendScore +
    0.25 * scores.momentumScore +
    0.2 * Math.max(scores.pullbackScore, scores.breakoutScore) +
    0.15 * scores.liquidityScore -
    0.1 * scores.riskScore
  ).toFixed(1));
}

function classifyToken(token, market, indicators, scores, session) {
  let marketState = "range", actionState = "hold", setupType = "range", bias = "neutral";
  const reasons = [];

  if (scores.breakoutScore >= 75 && scores.trendScore >= 60) {
    marketState = "breakout"; actionState = "buy"; setupType = "breakout"; bias = "bull";
    reasons.push("breakout_score_high", "trend_confirmed");
  } else if (scores.pullbackScore >= 70 && scores.trendScore >= 65) {
    marketState = "pullback"; actionState = "watch"; setupType = "pullback"; bias = "bull";
    reasons.push("bull_context", "pullback_quality_high");
  } else if (scores.trendScore >= 70 && scores.momentumScore >= 60) {
    marketState = "bull"; actionState = "buy"; setupType = "continuation"; bias = "bull";
    reasons.push("trend_strong", "momentum_confirmed");
  } else if (scores.bearScore >= 70 && indicators.macdBias === "bear") {
    marketState = "bear"; actionState = "sell"; setupType = "continuation"; bias = "bear";
    reasons.push("bear_trend", "macd_negative");
  } else if (indicators.rsi14 >= 75 && indicators.vwapDeviationPct > 2.2) {
    marketState = "exhaustion"; actionState = "watch"; setupType = "reversal"; bias = "bull";
    reasons.push("overextended", "far_above_vwap");
  } else {
    marketState = "range"; actionState = "hold"; setupType = "range";
    bias = indicators.emaTrend === "bull" ? "bull" : indicators.emaTrend === "bear" ? "bear" : "neutral";
    reasons.push("no_clear_edge");
  }

  if (session.isWeekend && actionState === "buy") {
    actionState = "watch";
    reasons.push("weekend_downgrade");
  }

  if (isStableOrPegged(token.symbol, token.name)) {
    if (actionState === "buy") actionState = "watch";
    if (marketState === "breakout") marketState = "range";
    reasons.push("stable_asset_suppressed");
  }

  const confidenceLabel = scores.confidenceScore >= 75 ? "high" : scores.confidenceScore >= 50 ? "medium" : "low";
  const riskLabel = scores.riskScore >= 67 ? "high" : scores.riskScore >= 34 ? "medium" : "low";

  const patternMap = {
    breakout: { code: "B2", name: "Breakout Continuation" },
    pullback: { code: "PB1", name: "Bull Pullback" },
    continuation: { code: bias === "bull" ? "C1" : "C2", name: bias === "bull" ? "Bull Continuation" : "Bear Continuation" },
    reversal: { code: "R1", name: "Exhaustion Reversal" },
    range: { code: "RG", name: "Range Hold" }
  };

  const pattern = patternMap[setupType] || { code: "NA", name: "No Pattern" };

  return {
    marketState,
    actionState,
    setupType,
    bias,
    signalLabel: actionState.toUpperCase(),
    signalPriority: { buy: 1, sell: 2, watch: 3, hold: 4 }[actionState] ?? 9,
    patternCode: pattern.code,
    patternName: pattern.name,
    confidenceLabel,
    riskLabel,
    statusReason: reasons
  };
}

function buildExecutionPlan(market, indicators, classification, session) {
  const atr = indicators.atr14 || market.price * 0.02;
  const riskPct = session.isWeekend ? 0.35 : 0.75;
  let entry, stop, tp1, tp2, tp3;

  if (classification.setupType === "breakout") {
    entry = indicators.resistance1; stop = entry - atr * 1.2; tp1 = entry + atr * 1; tp2 = entry + atr * 2; tp3 = entry + atr * 3;
  } else if (classification.setupType === "pullback") {
    entry = Math.max(indicators.vwap, indicators.support1); stop = entry - atr * 1; tp1 = entry + atr * 1.2; tp2 = entry + atr * 2.2; tp3 = entry + atr * 3;
  } else if (classification.actionState === "sell") {
    entry = Math.min(indicators.vwap, indicators.support1); stop = entry + atr * 1.2; tp1 = entry - atr * 1; tp2 = entry - atr * 2; tp3 = entry - atr * 3;
  } else {
    entry = market.price; stop = market.price - atr; tp1 = market.price + atr; tp2 = market.price + atr * 2; tp3 = market.price + atr * 3;
  }

  const riskReward = Math.abs(tp1 - entry) / Math.max(Math.abs(entry - stop), 0.00000001);

  return {
    entry,
    stop,
    takeProfit1: tp1,
    takeProfit2: tp2,
    takeProfit3: tp3,
    riskReward: Number(riskReward.toFixed(2)),
    holdWindowMin: 15,
    holdWindowMax: 60,
    timeStopBars: 10,
    riskPct,
    trailRule: "ema20_or_atr_1_5",
    addonRule: "vwap_bounce_and_rsi_gt_55",
    invalidationRule: "vwap_and_ema20_reversal"
  };
}

async function fetchMarketRows() {
  const pages = Array.from({ length: SCAN_PAGES }, (_, i) => i + 1);
  const requests = pages.map(page => {
    const url =
      `https://api.coingecko.com/api/v3/coins/markets?vs_currency=${BASE_CURRENCY}` +
      `&order=market_cap_desc&sparkline=true&price_change_percentage=1h,24h,7d,30d` +
      `&per_page=${SCAN_PER_PAGE}&page=${page}`;
    return fetch(url, { cache: "no-store" }).then(async res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    });
  });

  const results = await Promise.all(requests);
  return results.flat();
}

function buildAnalyses(rows) {
  const session = getSessionState();
  const analyses = [];
  const missing = [];
  const dedupe = new Set();

  for (const row of rows) {
    if (!row?.id || !row?.symbol || !row?.name || !Number.isFinite(row?.current_price)) continue;
    if (dedupe.has(row.id)) continue;
    dedupe.add(row.id);
    if ((row.total_volume ?? 0) < MIN_VOLUME_USD) continue;

    const symbol = normalizeSymbol(row.symbol);
    if (!REVOLUT_X_SYMBOLS.has(symbol)) continue;

    const token = {
      symbol,
      name: row.name,
      cgId: row.id,
      color: "#4f8cff",
      sector: isStableOrPegged(symbol, row.name) ? "stable" : "market"
    };

    const market = {
      tokenId: token.symbol.toLowerCase(),
      asOf: new Date().toISOString(),
      source: "CoinGecko",
      price: row.current_price,
      change1hPct: row.price_change_percentage_1h_in_currency ?? 0,
      change24hPct: row.price_change_percentage_24h_in_currency ?? 0,
      change7dPct: row.price_change_percentage_7d_in_currency ?? 0,
      change30dPct: row.price_change_percentage_30d_in_currency ?? 0,
      volume24hUsd: row.total_volume ?? 0,
      marketCapUsd: row.market_cap ?? 0,
      dataQuality: "live",
      isStale: false
    };

    const indicators = computeIndicators(row);
    const scores = {
      trendScore: calcTrendScore(market, indicators),
      momentumScore: calcMomentumScore(market, indicators),
      pullbackScore: 0,
      breakoutScore: 0,
      bearScore: calcBearScore(market, indicators),
      liquidityScore: calcLiquidityScore(market),
      riskScore: 0,
      confidenceScore: 0,
      winProbabilityPct: 0,
      rankScore: 0
    };

    scores.pullbackScore = calcPullbackScore(market, indicators, scores);
    scores.breakoutScore = calcBreakoutScore(market, indicators, scores);
    scores.riskScore = calcRiskScore(indicators, session);
    scores.confidenceScore = calcConfidenceScore(scores);
    scores.winProbabilityPct = calcWinProbability(scores);
    scores.rankScore = calcRankScore(scores);

    const classification = classifyToken(token, market, indicators, scores, session);
    const execution = buildExecutionPlan(market, indicators, classification, session);

    analyses.push({ token, market, indicators, scores, classification, execution });
  }

  analyses.sort((a, b) => getBuyPriorityScore(b) - getBuyPriorityScore(a));
  return { analyses, missing };
}

function getBuyPriorityScore(item) {
  const signalBoost =
    item.classification.actionState === "buy" ? 40 :
    item.classification.actionState === "watch" ? 18 :
    item.classification.actionState === "hold" ? 4 : -20;

  const stateBoost =
    item.classification.marketState === "pullback" ? 18 :
    item.classification.marketState === "bull" ? 14 :
    item.classification.marketState === "breakout" ? 8 :
    item.classification.marketState === "range" ? -4 :
    item.classification.marketState === "exhaustion" ? -14 :
    item.classification.marketState === "bear" ? -24 : 0;

  const rsi = Number(item.indicators.rsi14 || 50);
  const rsiBoost =
    rsi >= 42 && rsi <= 58 ? 18 :
    rsi >= 35 && rsi < 42 ? 12 :
    rsi > 58 && rsi <= 65 ? 6 :
    rsi >= 25 && rsi < 35 ? 4 :
    rsi > 65 && rsi <= 75 ? -10 :
    -18;

  const trendBoost = Number(item.scores.trendScore || 0) * 0.22;

  const move24h = Number(item.market.change24hPct || 0);
  const momentumBoost =
    move24h >= 0 && move24h <= 4 ? 10 :
    move24h > 4 && move24h <= 8 ? 6 :
    move24h > 8 && move24h <= 15 ? -2 :
    move24h > 15 ? -12 :
    move24h >= -3 ? 6 :
    move24h >= -6 ? 2 : -8;

  const volumeBoost =
    item.indicators.volumeQuality === "high" ? 10 :
    item.indicators.volumeQuality === "medium" ? 5 :
    item.indicators.volumeQuality === "low" ? -6 : 0;

  const stablePenalty = isStableOrPegged(item.token.symbol, item.token.name) ? 80 : 0;
  const rawScoreBoost = Number(item.scores.rankScore || 0) * 0.35;

  return signalBoost + stateBoost + rsiBoost + trendBoost + momentumBoost + volumeBoost + rawScoreBoost - stablePenalty;
}

function getFilteredAnalyses() {
  let list = [...st.analyses];
  const signal = els.signalFilter.value;
  const marketState = els.stateFilter.value;
  const q = els.searchInput.value.trim().toLowerCase();
  const sortBy = els.sortBy.value;

  if (signal !== "all") list = list.filter(x => x.classification.actionState === signal);
  if (marketState !== "all") list = list.filter(x => x.classification.marketState === marketState);
  if (q) {
    list = list.filter(x =>
      [x.token.symbol, x.token.name, x.classification.marketState, x.classification.actionState, x.classification.setupType, x.classification.patternName]
        .join(" ")
        .toLowerCase()
        .includes(q)
    );
  }

  list.sort((a, b) => {
    switch (sortBy) {
      case "bestbuy": {
        const diff = getBuyPriorityScore(b) - getBuyPriorityScore(a);
        if (diff !== 0) return diff;
        const trendDiff = Number(b.scores.trendScore || 0) - Number(a.scores.trendScore || 0);
        if (trendDiff !== 0) return trendDiff;
        const rsiCenterA = Math.abs((Number(a.indicators.rsi14 || 50)) - 50);
        const rsiCenterB = Math.abs((Number(b.indicators.rsi14 || 50)) - 50);
        return rsiCenterA - rsiCenterB;
      }
      case "change24":
        return b.market.change24hPct - a.market.change24hPct;
      case "volume":
        return b.market.volume24hUsd - a.market.volume24hUsd;
      case "symbol":
        return a.token.symbol.localeCompare(b.token.symbol);
      default:
        return b.scores.rankScore - a.scores.rankScore;
    }
  });

  return list;
}

function kv(label, value) {
  return `<div class="kv"><div class="k">${label}</div><div class="v">${value}</div></div>`;
}

function barRow(label, value) {
  const color = value >= 70 ? "var(--green)" : value >= 50 ? "var(--amber)" : "var(--blue)";
  return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar"><span style="width:${clamp(value,0,100)}%;background:${color}"></span></div><div class="bar-value">${value}</div></div>`;
}

function summarize() {
  const summary = {
    configured: st.analyses.length,
    scanned: st.analyses.length,
    missing: st.missing.length,
    actionCounts: { buy: 0, sell: 0, watch: 0, hold: 0 },
    marketCounts: { bull: 0, bear: 0, pullback: 0, breakout: 0, range: 0, exhaustion: 0 },
    avgRsi: 0,
    avg24: 0,
    pctAboveEma20: 0,
    pctAboveVwap: 0
  };

  if (!st.analyses.length) return summary;

  let aboveEma = 0, aboveVwap = 0, rsiSum = 0, avg24Sum = 0;
  st.analyses.forEach(x => {
    summary.actionCounts[x.classification.actionState] = (summary.actionCounts[x.classification.actionState] || 0) + 1;
    summary.marketCounts[x.classification.marketState] = (summary.marketCounts[x.classification.marketState] || 0) + 1;
    rsiSum += x.indicators.rsi14;
    avg24Sum += x.market.change24hPct;
    if (x.market.price > x.indicators.ema20) aboveEma++;
    if (x.market.price > x.indicators.vwap) aboveVwap++;
  });

  summary.avgRsi = rsiSum / st.analyses.length;
  summary.avg24 = avg24Sum / st.analyses.length;
  summary.pctAboveEma20 = (aboveEma / st.analyses.length) * 100;
  summary.pctAboveVwap = (aboveVwap / st.analyses.length) * 100;

  return summary;
}

function renderOpportunityLists() {
  const top = (arr, n = 6) => arr.slice(0, n);

  const buyNow = top(
    st.analyses
      .filter(x => !isStableOrPegged(x.token.symbol, x.token.name))
      .sort((a, b) => getBuyPriorityScore(b) - getBuyPriorityScore(a))
  );

  const breakouts = top(
    st.analyses.filter(x => x.classification.marketState === "breakout" && !isStableOrPegged(x.token.symbol, x.token.name))
      .sort((a, b) => b.scores.breakoutScore - a.scores.breakoutScore)
  );

  const pullbacks = top(
    st.analyses.filter(x => x.classification.marketState === "pullback" && !isStableOrPegged(x.token.symbol, x.token.name))
      .sort((a, b) => b.scores.pullbackScore - a.scores.pullbackScore)
  );

  const bulls = top(
    st.analyses.filter(x => x.classification.bias === "bull" && !isStableOrPegged(x.token.symbol, x.token.name))
      .sort((a, b) => b.scores.trendScore - a.scores.trendScore)
  );

  const bears = top(
    st.analyses.filter(x => x.classification.marketState === "bear")
      .sort((a, b) => b.scores.bearScore - a.scores.bearScore)
  );

  const renderRankList = (items, scoreKey, mode = "score") => {
    if (!items.length) return '<div class="sub">No setups in this category right now.</div>';
    return items.map((x, idx) => `
      <div class="rank-item">
        <div class="rank-num">${idx + 1}</div>
        <div>
          <div class="symbol" style="font-size:14px">${x.token.symbol}/USD</div>
          <div class="sub" style="font-size:11px">${x.token.name} · ${x.classification.patternName}</div>
        </div>
        <div style="text-align:right">
          <div class="value" style="font-family:'IBM Plex Mono',monospace">
            ${mode === "buy" ? fmt.num(getBuyPriorityScore(x), 1) : x.scores[scoreKey]}
          </div>
          <div class="sub ${x.market.change24hPct >= 0 ? "g" : "r"}" style="font-size:11px">${fmt.pct(x.market.change24hPct)}</div>
        </div>
      </div>
    `).join("");
  };

  els.breakoutList.innerHTML = renderRankList(breakouts, "breakoutScore");
  els.pullbackList.innerHTML = renderRankList(pullbacks, "pullbackScore");
  els.bullList.innerHTML = renderRankList(buyNow, "rankScore", "buy");
  els.bearList.innerHTML = renderRankList(bears, "bearScore");
}

function renderSummary() {
  const s = summarize();
  const session = getSessionState();

  els.buyCount.textContent = s.actionCounts.buy;
  els.sellCount.textContent = s.actionCounts.sell;
  els.watchCount.textContent = s.actionCounts.watch;
  els.holdCount.textContent = s.actionCounts.hold;
  els.scannedCount.textContent = s.scanned;

  els.ovConfigured.textContent = s.configured;
  els.ovScanned.textContent = s.scanned;
  els.ovMissing.textContent = s.missing;
  els.ovUpdated.textContent = fmt.time(st.lastUpdated);
  els.ovSession.textContent = session.mode.toUpperCase();
  els.ovAvgRsi.textContent = fmt.num(s.avgRsi, 1);
  els.ovAvg24.textContent = fmt.pct(s.avg24, 2);
  els.ovAboveEma.textContent = fmt.pct(s.pctAboveEma20, 1);
  els.ovAboveVwap.textContent = fmt.pct(s.pctAboveVwap, 1);

  els.breadthBars.innerHTML =
    `${barRow("Above EMA20", Number(s.pctAboveEma20.toFixed(1)))}${barRow("Above VWAP", Number(s.pctAboveVwap.toFixed(1)))}${barRow("Avg RSI", Number(s.avgRsi.toFixed(1)))}${barRow("Buy ratio", Number(((s.actionCounts.buy / Math.max(1, s.scanned)) * 100).toFixed(1)))}`;

  els.stateStats.innerHTML = [
    ["bull", s.marketCounts.bull],
    ["breakout", s.marketCounts.breakout],
    ["pullback", s.marketCounts.pullback],
    ["bear", s.marketCounts.bear],
    ["range", s.marketCounts.range],
    ["exhaustion", s.marketCounts.exhaustion]
  ].map(([label, value]) => kv(label, value)).join("");

  els.actionStats.innerHTML = [
    ["buy", s.actionCounts.buy],
    ["sell", s.actionCounts.sell],
    ["watch", s.actionCounts.watch],
    ["hold", s.actionCounts.hold]
  ].map(([label, value]) => kv(label, value)).join("");

  renderOpportunityLists();

  els.healthConfigured.textContent = s.configured;
  els.healthScanned.textContent = s.scanned;
  els.healthMissing.textContent = s.missing;
  els.healthQuality.textContent = st.apiErrors ? "degraded" : "live";
  els.missingText.textContent = `Scanning live CoinGecko rows, filtered to Revolut X symbols only, minimum 24h volume ${fmt.compact(MIN_VOLUME_USD)}.`;
}

function setFooter(message) {
  els.footerText.textContent = message;
}

function renderAll() {
  renderSessionBar();
  renderTokenList();
  renderDetail();
  renderSummary();
  els.liveText.textContent = `LIVE · Revolut X filtered scan · ${fmt.time(st.lastUpdated)}`;
  setFooter(`v${APP_VERSION} · ${st.analyses.length} Revolut X tokens scanned · updated ${fmt.dateTime(st.lastUpdated)}`);
}

async function refreshData() {
  if (st.refreshInFlight) return;
  st.refreshInFlight = true;
  els.refreshBtn.textContent = "Refreshing...";
  setFooter("Refreshing live Revolut X market data...");

  try {
    const rows = await fetchMarketRows();
    const { analyses, missing } = buildAnalyses(rows);
    st.analyses = analyses;
    st.missing = missing;
    st.lastUpdated = Date.now();
    if (!st.selectedId && analyses.length) st.selectedId = analyses[0].token.cgId;
    renderAll();
  } catch (err) {
    st.apiErrors += 1;
    setFooter(`Refresh failed: ${err.message}`);
    console.error(err);
  } finally {
    st.refreshInFlight = false;
    els.refreshBtn.textContent = "Refresh";
  }
}

function bindEvents() {
  els.tabs.forEach(tab => tab.addEventListener("click", () => {
    els.tabs.forEach(t => t.classList.remove("active"));
    els.views.forEach(v => v.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.view).classList.add("active");
  }));

  [els.signalFilter, els.stateFilter, els.sortBy].forEach(el => el.addEventListener("change", renderAll));
  els.searchInput.addEventListener("input", renderAll);
  els.refreshBtn.addEventListener("click", refreshData);
}

function ensureBestBuyOption() {
  if (!els.sortBy.querySelector('option[value="bestbuy"]')) {
    const opt = document.createElement("option");
    opt.value = "bestbuy";
    opt.textContent = "Sort: best buy now";
    els.sortBy.insertBefore(opt, els.sortBy.firstChild);
  }
  els.sortBy.value = "bestbuy";
}

bindEvents();
ensureBestBuyOption();
renderSessionBar();
refreshData();
setInterval(refreshData, REFRESH_MS);
</script>
