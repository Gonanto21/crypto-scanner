<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Revolut X · Pro Scanner v5 · LIVE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #171722;
      --bg4: #202032;
      --bg5: #27273b;
      --border: #2a2a3a;
      --border2: #3a3a53;
      --text: #edf0f6;
      --text2: #9ea4bb;
      --text3: #616781;
      --green: #00e676;
      --red: #ff4569;
      --amber: #ffb300;
      --blue: #4f8cff;
      --purple: #8e6cff;
      --cyan: #00d5ff;
      --accent: #1c268f;
      --buy-bg: rgba(0, 230, 118, 0.12);
      --sell-bg: rgba(255, 69, 105, 0.12);
      --watch-bg: rgba(255, 179, 0, 0.12);
      --hold-bg: rgba(79, 140, 255, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(180deg, #0a0a0f 0%, #0c0d14 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17, 17, 24, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px 10px;
    }

    .header-top,
    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-top {
      margin-bottom: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: "IBM Plex Mono", monospace;
    }

    .badge.primary {
      background: var(--accent);
      color: #fff;
    }

    .badge.live {
      background: var(--green);
      color: #000;
    }

    .title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
    }

    .live-box {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--green);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 rgba(0, 230, 118, 0.4);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(0, 230, 118, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
      }
    }

    .session {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text2);
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
    }

    .session-pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 999px;
      padding: 4px 8px;
    }

    .session-pill.active {
      color: var(--green);
      border-color: rgba(0, 230, 118, 0.3);
      background: rgba(0, 230, 118, 0.08);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      transition: 0.18s ease;
    }

    .btn:hover {
      background: var(--bg4);
      border-color: var(--border2);
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover {
      filter: brightness(1.08);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .tab {
      min-height: 48px;
      padding: 12px 8px;
      background: transparent;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      font-size: 12px;
      font-weight: 600;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--blue);
      background: var(--bg3);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .metric-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      min-height: 72px;
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 6px;
      font-family: "IBM Plex Mono", monospace;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
    }

    .metric-sub {
      margin-top: 4px;
      color: var(--text2);
      font-size: 11px;
    }

    .g { color: var(--green); }
    .r { color: var(--red); }
    .a { color: var(--amber); }
    .b { color: var(--blue); }
    .p { color: var(--purple); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .filters select,
    .filters input {
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      padding: 0 12px;
      min-width: 120px;
      outline: none;
    }

    .filters input {
      flex: 1;
      min-width: 180px;
    }

    .filters .mini {
      min-width: 86px;
    }

    .board {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 0;
      min-height: calc(100vh - 250px);
    }

    .left-pane {
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .right-pane {
      min-width: 0;
      background: rgba(17, 17, 24, 0.5);
    }

    .list {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .token-card {
      background: linear-gradient(180deg, var(--bg3), var(--bg4));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: 0.18s ease;
      cursor: pointer;
    }

    .token-card:hover,
    .token-card.active {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .card-top,
    .card-mid,
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .token-head {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .coin-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.04);
    }

    .token-title {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .symbol {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      font-family: "IBM Plex Mono", monospace;
    }

    .name {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }

    .price-box {
      text-align: right;
    }

    .price {
      font-size: 17px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
    }

    .change {
      font-size: 12px;
      margin-top: 3px;
      font-family: "IBM Plex Mono", monospace;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: "IBM Plex Mono", monospace;
      border: 1px solid transparent;
    }

    .pill.buy { background: var(--buy-bg); color: var(--green); border-color: rgba(0, 230, 118, 0.25); }
    .pill.sell { background: var(--sell-bg); color: var(--red); border-color: rgba(255, 69, 105, 0.25); }
    .pill.watch { background: var(--watch-bg); color: var(--amber); border-color: rgba(255, 179, 0, 0.25); }
    .pill.hold { background: var(--hold-bg); color: var(--blue); border-color: rgba(79, 140, 255, 0.25); }
    .pill.state { background: rgba(142, 108, 255, 0.12); color: #b6a4ff; border-color: rgba(142, 108, 255, 0.25); }
    .pill.setup { background: rgba(0, 213, 255, 0.12); color: var(--cyan); border-color: rgba(0, 213, 255, 0.25); }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }

    .mini-stat {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 8px;
    }

    .mini-stat .k {
      color: var(--text3);
      font-size: 10px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
    }

    .mini-stat .v {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      font-family: "IBM Plex Mono", monospace;
    }

    .detail {
      padding: 14px;
      display: grid;
      gap: 12px;
      position: sticky;
      top: 146px;
    }

    .panel {
      background: linear-gradient(180deg, var(--bg3), var(--bg4));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .detail-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .detail-price {
      font-size: 24px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
      margin-top: 4px;
    }

    .grid-2,
    .grid-3,
    .grid-4 {
      display: grid;
      gap: 8px;
    }

    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    .kv {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 10px;
    }

    .kv .k {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
      margin-bottom: 5px;
    }

    .kv .v {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      font-family: "IBM Plex Mono", monospace;
    }

    .note {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
    }

    .bar-wrap {
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 84px 1fr 50px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .bar-label,
    .bar-value {
      font-family: "IBM Plex Mono", monospace;
      color: var(--text2);
    }

    .bar-value {
      text-align: right;
      color: var(--text);
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #0e1017;
      border: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    .table-like {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.06);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row .label {
      color: var(--text2);
      font-size: 12px;
    }

    .row .value {
      color: var(--text);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      text-align: right;
    }

      display:
