<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revolut X · Pro Scanner v5 · LIVE</title>
  <style>
    :root{
      --bg:#0b0d12;--panel:#141925;--panel2:#1b2231;--border:#2a3347;
      --text:#eef3ff;--muted:#9aa6c7;--green:#00e676;--red:#ff4569;
      --amber:#ffb300;--blue:#4f8cff
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .title{font-size:24px;font-weight:700}
    .sub{color:var(--muted);font-size:14px;margin-top:6px}
    .btn{background:var(--blue);color:#fff;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .card,.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
    .k{color:var(--muted);font-size:12px;text-transform:uppercase;margin-bottom:8px}
    .v{font-size:26px;font-weight:700}
    .g{color:var(--green)} .r{color:var(--red)} .a{color:var(--amber)} .b{color:var(--blue)}
    .layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .list{display:grid;gap:10px}
    .token{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px}
    .row{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .symbol{font-weight:700;font-size:16px}
    .name{color:var(--muted);font-size:13px;margin-top:4px}
    .price{font-weight:700}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-top:8px}
    .buy{background:rgba(0,230,118,.12);color:var(--green)}
    .sell{background:rgba(255,69,105,.12);color:var(--red)}
    .watch{background:rgba(255,179,0,.12);color:var(--amber)}
    .hold{background:rgba(79,140,255,.12);color:var(--blue)}
    .detailgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .mini{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px}
    .mini .k{margin-bottom:4px}
    .foot{margin-top:16px;color:var(--muted);font-size:12px}
    @media (max-width:900px){.layout,.grid{grid-template-columns:1fr 1fr}}
    @media (max-width:700px){.layout,.grid,.detailgrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Revolut X · Pro Scanner v5 · LIVE</div>
        <div class="sub" id="status">Loading live market data...</div>
      </div>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="grid">
      <div class="card"><div class="k">Buy</div><div class="v g" id="buyCount">0</div></div>
      <div class="card"><div class="k">Sell</div><div class="v r" id="sellCount">0</div></div>
      <div class="card"><div class="k">Watch</div><div class="v a" id="watchCount">0</div></div>
      <div class="card"><div class="k">Hold</div><div class="v b" id="holdCount">0</div></div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="k">Scanner</div>
        <div class="list" id="tokenList"></div>
      </div>

      <div class="panel">
        <div class="k">Selected token</div>
        <div id="detail"></div>
      </div>
    </div>

    <div class="foot" id="foot">Waiting for data...</div>
  </div>

  <script>
    const TOKENS = [
      { symbol:"BTC", name:"Bitcoin", id:"bitcoin" },
      { symbol:"ETH", name:"Ethereum", id:"ethereum" },
      { symbol:"XRP", name:"XRP", id:"ripple" },
      { symbol:"SOL", name:"Solana", id:"solana" },
      { symbol:"DOGE", name:"Dogecoin", id:"dogecoin" },
      { symbol:"ADA", name:"Cardano", id:"cardano" },
      { symbol:"LINK", name:"Chainlink", id:"chainlink" },
      { symbol:"AVAX", name:"Avalanche", id:"avalanche-2" },
      { symbol:"SUI", name:"Sui", id:"sui" },
      { symbol:"PEPE", name:"Pepe", id:"pepe" },
      { symbol:"BONK", name:"Bonk", id:"bonk" },
      { symbol:"PENGU", name:"Pudgy Penguins", id:"pudgy-penguins" }
    ];

    let DATA = [];
    let SELECTED = null;

    function usd(v){
      if(v >= 1) return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:4}).format(v);
      return '$' + Number(v).toFixed(8).replace(/0+$/,'').replace(/\.$/,'');
    }

    function pct(v){
      const n = Number(v || 0);
      return `${n > 0 ? '+' : ''}${n.toFixed(2)}%`;
    }

    function classify(t){
      if ((t.change24hPct > 3 && t.change7dPct > 5) || (t.change24hPct > 1.5 && t.change1hPct > 0.4)) return 'buy';
      if (t.change24hPct < -3 || (t.change1hPct < -1 && t.change7dPct < 0)) return 'sell';
      if (Math.abs(t.change24hPct) < 1.2) return 'hold';
      return 'watch';
    }

    function render(){
      const buy = DATA.filter(x => x.signal === 'buy').length;
      const sell = DATA.filter(x => x.signal === 'sell').length;
      const watch = DATA.filter(x => x.signal === 'watch').length;
      const hold = DATA.filter(x => x.signal === 'hold').length;

      document.getElementById('buyCount').textContent = buy;
      document.getElementById('sellCount').textContent = sell;
      document.getElementById('watchCount').textContent = watch;
      document.getElementById('holdCount').textContent = hold;

      const list = document.getElementById('tokenList');
      list.innerHTML = DATA.map(x => `
        <div class="token" data-symbol="${x.symbol}">
          <div class="row">
            <div>
              <div class="symbol">${x.symbol}/USD</div>
              <div class="name">${x.name}</div>
            </div>
            <div>
              <div class="price">${usd(x.price)}</div>
              <div class="${x.change24hPct >= 0 ? 'g' : 'r'}">${pct(x.change24hPct)}</div>
            </div>
          </div>
          <span class="pill ${x.signal}">${x.signal.toUpperCase()}</span>
        </div>
      `).join('');

      document.querySelectorAll('.token').forEach(el => {
        el.addEventListener('click', () => {
          SELECTED = DATA.find(x => x.symbol === el.dataset.symbol);
          renderDetail();
        });
      });

      if (!SELECTED && DATA.length) SELECTED = DATA[0];
      renderDetail();
    }

    function renderDetail(){
      const el = document.getElementById('detail');
      if(!SELECTED){
        el.innerHTML = '<div class="sub">No token selected.</div>';
        return;
      }

      el.innerHTML = `
        <div style="font-size:22px;font-weight:700;margin-bottom:6px">${SELECTED.symbol}/USD</div>
        <div class="sub" style="margin-bottom:14px">${SELECTED.name}</div>
        <div style="font-size:24px;font-weight:700;margin-bottom:6px">${usd(SELECTED.price)}</div>
        <div class="${SELECTED.change24hPct >= 0 ? 'g' : 'r'}" style="margin-bottom:14px">${pct(SELECTED.change24hPct)} · 24h</div>
        <span class="pill ${SELECTED.signal}" style="margin-bottom:14px">${SELECTED.signal.toUpperCase()}</span>
        <div class="detailgrid" style="margin-top:14px">
          <div class="mini"><div class="k">1h change</div><div>${pct(SELECTED.change1hPct)}</div></div>
          <div class="mini"><div class="k">7d change</div><div>${pct(SELECTED.change7dPct)}</div></div>
          <div class="mini"><div class="k">Volume</div><div>${new Intl.NumberFormat('en-US',{notation:'compact'}).format(SELECTED.volume)}</div></div>
          <div class="mini"><div class="k">Signal</div><div>${SELECTED.signal.toUpperCase()}</div></div>
        </div>
      `;
    }

    async function loadData(){
      const ids = TOKENS.map(t => t.id).join(',');
      document.getElementById('status').textContent = 'Loading live market data...';

      try{
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${encodeURIComponent(ids)}&order=market_cap_desc&sparkline=false&price_change_percentage=1h,24h,7d`);
        const rows = await res.json();

        DATA = TOKENS.map(t => {
          const row = rows.find(r => r.id === t.id);
          if(!row) return null;
          return {
            symbol: t.symbol,
            name: t.name,
            price: row.current_price,
            change1hPct: row.price_change_percentage_1h_in_currency || 0,
            change24hPct: row.price_change_percentage_24h_in_currency || 0,
            change7dPct: row.price_change_percentage_7d_in_currency || 0,
            volume: row.total_volume || 0,
            signal: 'hold'
          };
        }).filter(Boolean).map(x => ({ ...x, signal: classify(x) }));

        DATA.sort((a,b) => {
          const order = { buy: 0, sell: 1, watch: 2, hold: 3 };
          return order[a.signal] - order[b.signal] || b.change24hPct - a.change24hPct;
        });

        document.getElementById('status').textContent = `LIVE · CoinGecko · ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        document.getElementById('foot').textContent = `${DATA.length}/${TOKENS.length} tokens scanned · updated ${new Date().toLocaleString()}`;
        render();
      }catch(err){
        document.getElementById('status').textContent = 'Load failed';
        document.getElementById('foot').textContent = 'Error: ' + err.message;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);
    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
